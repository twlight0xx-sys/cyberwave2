<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBERWAVE // TERMINAL_v2.0</title>
    <style>
        /* HACKER AESTHETIC */
        body, html {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px #0f0;
        }

        /* SCANLINE ANIMATION */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 101;
            background: linear-gradient(0deg, rgba(0, 255, 0, 0) 0%, rgba(0, 255, 0, 0.2) 50%, rgba(0, 255, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }

        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .login-box {
            border: 1px solid #0f0;
            padding: 30px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #0f0;
            text-align: center;
        }

        input {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            margin: 10px 0;
            width: 80%;
            outline: none;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        button:hover { background: #000; color: #0f0; border: 1px solid #0f0; }

        /* MAIN INTERFACE */
        #main-ui { display: none; height: 100vh; grid-template-columns: 250px 1fr; }

        .sidebar {
            border-right: 1px solid #0f0;
            padding: 20px;
            display: flex; flex-direction: column;
            background: rgba(0, 10, 0, 0.8);
        }

        .content { padding: 20px; overflow-y: auto; }

        /* COLLAPSIBLE */
        .collapsible {
            background: none;
            color: #0f0;
            cursor: pointer;
            padding: 10px;
            width: 100%;
            border: 1px solid #0f0;
            text-align: left;
            outline: none;
            font-size: 15px;
            margin-top: 10px;
        }

        .active, .collapsible:hover { background: #004400; }

        .proxy-list {
            display: none;
            padding: 10px;
            border: 1px solid #0f0;
            border-top: none;
        }

        .proxy-link {
            display: block;
            color: #0f0;
            text-decoration: none;
            padding: 5px 0;
            font-size: 14px;
        }

        .proxy-link:hover { text-decoration: underline; }

        /* ADMIN/OWNER PANEL */
        #owner-panel {
            margin-top: auto;
            border: 1px solid #f00;
            padding: 10px;
            color: #f00;
            display: none;
        }

        .status-msg { font-size: 12px; margin-bottom: 10px; }

    </style>
</head>
<body>

<div class="scanline"></div>

<div id="login-screen">
    <div class="login-box">
        <h2 id="login-title">SYSTEM_LOGIN</h2>
        <p class="status-msg" id="msg">Awaiting Credentials...</p>
        <input type="text" id="usr" placeholder="USERNAME">
        <input type="password" id="pwd" placeholder="PASSWORD">
        <br>
        <button onclick="login()">LOGIN</button>
        <button onclick="register()">SIGN_UP</button>
    </div>
</div>

<div id="main-ui">
    <div class="sidebar">
        <h3>CYBERWAVE_SYS</h3>
        <p id="user-display" style="font-size: 12px;"></p>
        
        <button class="collapsible">>> PROXY_NETWORK</button>
        <div class="proxy-list">
            <a href="#" class="proxy-link">Overcloaked</a>
            <a href="#" class="proxy-link">DayDream X</a>
            <a href="#" class="proxy-link">Interstellar</a>
            <a href="#" class="proxy-link">Utopia</a>
            <a href="#" class="proxy-link">Vapor V4</a>
            <a href="#" class="proxy-link">Shadow</a>
        </div>

        <div id="owner-panel">
            <h4>[OWNER_COMMAND]</h4>
            <input type="text" id="ban-user" placeholder="Username to Ban" style="border-color: #f00; color: #f00; width: 90%;">
            <button onclick="banUser()" style="background: #f00; color: #000; width: 100%;">TERMINATE_USER</button>
        </div>
    </div>

    <div class="content">
        <h2>CENTRAL_DATABASE</h2>
        <hr border="1" color="#0f0">
        <p>> Connection established...</p>
        <p>> Welcome to CyberWave, <span id="welcome-name"></span>.</p>
        <br>
        <button onclick="logout()">LOGOUT_SESSION</button>
    </div>
</div>

<script>
    // PRESET ACCOUNTS
    const admins = {};
    for(let i=1; i<=10; i++){
        admins[`admin${i}`] = `cyberwave${i}`;
    }
    
    const OWNER = "_techrobyte";
    const OWNER_PWD = "techyy";

    // COLLAPSIBLE LOGIC
    var coll = document.getElementsByClassName("collapsible");
    for (var i = 0; i < coll.length; i++) {
        coll[i].addEventListener("click", function() {
            this.classList.toggle("active");
            var content = this.nextElementSibling;
            if (content.style.display === "block") {
                content.style.display = "none";
            } else {
                content.style.display = "block";
            }
        });
    }

    function login() {
        const u = document.getElementById('usr').value;
        const p = document.getElementById('pwd').value;
        const msg = document.getElementById('msg');

        // Check if Banned
        if(localStorage.getItem('ban_' + u)) {
            msg.innerText = "ACCESS_DENIED: USER_TERMINATED";
            return;
        }

        // Owner Login
        if (u === OWNER && p === OWNER_PWD) {
            enterApp(u, true);
            return;
        }

        // Admin Login
        if (admins[u] && admins[u] === p) {
            enterApp(u, false);
            return;
        }

        // Regular User Login (from LocalStorage)
        const savedPwd = localStorage.getItem('user_' + u);
        if (savedPwd && savedPwd === p) {
            enterApp(u, false);
        } else {
            msg.innerText = "ERROR: INVALID_CREDENTIALS";
        }
    }

    function register() {
        const u = document.getElementById('usr').value;
        const p = document.getElementById('pwd').value;
        const msg = document.getElementById('msg');

        if(u.length < 3) { msg.innerText = "ERROR: NAME_TOO_SHORT"; return; }
        if(localStorage.getItem('user_' + u) || admins[u] || u === OWNER) {
            msg.innerText = "ERROR: USER_EXISTS";
        } else {
            localStorage.setItem('user_' + u, p);
            msg.innerText = "SUCCESS: USER_REGISTERED";
        }
    }

    function enterApp(name, isOwner) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'grid';
        document.getElementById('welcome-name').innerText = name;
        document.getElementById('user-display').innerText = "Logged in as: " + name;
        
        if(isOwner) {
            document.getElementById('owner-panel').style.display = 'block';
        }
    }

    function banUser() {
        const target = document.getElementById('ban-user').value;
        if(target === OWNER) { alert("Cannot ban owner."); return; }
        localStorage.setItem('ban_' + target, "true");
        alert("User " + target + " has been terminated.");
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
