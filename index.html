<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBERWAVE // MISSION_CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --hacker-green: #00ff41; --bg-dark: #0a0e1a; --btn-blue: #58a6ff; --admin-gold: #f4d03f; --ban-red: #ff3333; }
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; font-weight: 500; }
        
        body, html { background: var(--bg-dark); color: #fff; margin: 0; height: 100vh; overflow: hidden; }

        /* MATRIX BACKGROUND */
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        /* 1. LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .login-container { width: 450px; padding: 40px; background: rgba(10, 14, 26, 0.95); border-radius: 8px; border: 1px solid #1a2234; }
        .login-title { color: var(--hacker-green); font-size: 42px; margin-bottom: 10px; }
        .login-subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        label { display: block; color: var(--hacker-green); margin-bottom: 10px; }
        input { width: 100%; background: #05070f; border: 1px solid #1a2234; color: #fff; padding: 15px; border-radius: 5px; margin-bottom: 25px; outline: none; }
        .login-btn { width: 100%; padding: 15px; border-radius: 5px; margin-bottom: 15px; cursor: pointer; background: transparent; border: 2px solid var(--hacker-green); color: var(--hacker-green); }
        .login-btn.blue { border-color: var(--btn-blue); color: var(--btn-blue); }

        /* 2. MAIN HUB */
        #main-app { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: #05070f; border-right: 1px solid #1a2234; padding: 20px; }
        .main-content { padding: 40px; overflow-y: auto; }
        .proxy-card { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .launch-btn { background: #3fb950; color: #fff; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; width: 100%; margin-top: 10px; }

        /* 3. ADMIN PANEL STYLE */
        .admin-block { background: #1c1c2b; border-radius: 5px; padding: 20px; margin-top: 20px; border-bottom: 2px solid var(--hacker-green); }
        .user-card { border-bottom: 1px solid #30363d; padding: 15px 0; }
        .role-btn { background: none; border: 2px solid var(--admin-gold); color: var(--admin-gold); padding: 5px 10px; margin: 10px 0; border-radius: 4px; }
        .btn-danger { background: none; border: 1px solid var(--ban-red); color: var(--ban-red); padding: 5px 10px; cursor: pointer; margin-right: 5px; }

        /* 4. OVERCLOAKED PAGE */
        #links-page { display: none; padding: 40px; height: 100vh; overflow-y: auto; }
        .link-row { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #30363d; }

        /* FLOATING CHAT */
        #floating-elements { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; align-items: center; }
        .user-mode-glow { border: 2px solid var(--hacker-green); color: var(--hacker-green); padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="login-screen">
    <div class="login-container">
        <h1 class="login-title">$ Cyberwave</h1>
        <div class="login-subtitle">[ access_terminal ]</div>
        <label>> USERNAME:</label>
        <input type="text" id="usr_in" placeholder="Username...">
        <label>> PASSWORD:</label>
        <input type="password" id="pwd_in" placeholder="Password...">
        <button class="login-btn" onclick="executeCreateAccount()">[CREATE_ACCOUNT]</button>
        <button class="login-btn blue" onclick="executeLogin()">[EXECUTE_LOGIN]</button>
        <div id="auth-status" style="color:red; font-size:12px; display:none;"></div>
    </div>
</div>

<div id="main-app">
    <aside class="sidebar">
        <h2 style="color:var(--hacker-green)">CYBERWAVE</h2>
        <button class="launch-btn" style="background:none; border:1px solid var(--btn-blue); color:var(--btn-blue)" onclick="executeLogout()">LOGOUT</button>
        
        <div id="admin-sidebar-tools" style="display:none; margin-top:30px;">
            <p style="color:var(--admin-gold)">[ ADMIN PANEL ]</p>
        </div>
    </aside>
    <main class="main-content">
        <div id="hub-content">
            <h1>Mirrors</h1>
            <div class="proxy-card">
                <h3>Nebula Sector</h3>
                <p style="color:#888">Status: Unlocked</p>
                <button class="launch-btn" onclick="showLinks()">Open Overcloaked</button>
            </div>

            <div id="admin-view" style="display:none;">
                <h2 style="color:var(--admin-gold)">User Management</h2>
                <div id="user-list-container" class="admin-block"></div>
            </div>
        </div>
    </main>
</div>

<div id="links-page">
    <button class="launch-btn" style="width:auto; margin-bottom:20px;" onclick="goHome()"><- Back</button>
    <h1>OVERCLOAKED SECTOR</h1>
    <div id="links-list"></div>
</div>

<div id="floating-elements">
    <div id="user-indicator" class="user-mode-glow" style="display:none;">[USER]</div>
    <div style="font-size:24px; cursor:pointer;" onclick="alert('Secure Chat Required')">💬</div>
</div>
