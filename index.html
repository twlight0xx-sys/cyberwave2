<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBERWAVE // MISSION HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #7df9ff; --bg-dark: #050505; --panel: #0f0f0f; }
        * { box-sizing: border-box; cursor: crosshair; font-family: 'Lexend', sans-serif; font-weight: 700; }
        
        body, html { background: var(--bg-dark); color: #fff; margin: 0; height: 100vh; overflow: hidden; }

        /* MATRIX BACKGROUND */
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.25; }

        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background: #000; border-bottom: 1px solid #1a1a1a;
        }
        .logo { color: var(--accent); font-size: 18px; }

        #app { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 50px); }

        /* SIDEBAR / CHAT */
        .sidebar { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 20px; }
        .chat-box { flex: 1; background: #000; border-radius: 8px; margin-top: 15px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #111; }
        #chat-content { flex: 1; font-size: 14px; color: #888; overflow-y: auto; }
        .chat-input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; margin: 10px 0; width: 100%; }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 5px; width: 100%; transition: 0.3s; }
        .send-btn:hover { box-shadow: 0 0 15px var(--accent); }

        /* CONTENT */
        .main-view { padding: 40px; overflow-y: auto; }
        
        /* COLLAPSIBLE SYSTEM */
        .collapsible {
            background-color: var(--panel);
            color: white;
            cursor: pointer;
            padding: 18px;
            width: 100%;
            border: 1px solid #1a1a1a;
            text-align: left;
            outline: none;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            border-radius: 8px;
        }

        .active, .collapsible:hover { border-color: var(--accent); }

        .content {
            padding: 0 18px;
            display: none;
            overflow: hidden;
            background-color: transparent;
            margin-top: 10px;
        }

        .mirror-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
            padding: 20px 0;
        }
        
        .mirror-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 8px; 
            padding: 20px; 
            text-align: center; 
        }
        
        .launch-btn { 
            background: var(--accent); 
            color: #000; 
            text-decoration: none; 
            padding: 8px 15px; 
            border-radius: 4px; 
            font-size: 12px; 
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav>
    <div class="logo">CYBER<span style="color:#fff">WAVE</span></div>
    <div class="status">Status: <span style="color:var(--accent)">Online</span></div>
</nav>

<div id="app">
    <aside class="sidebar">
        <div style="font-size:18px;">Live Chat</div>
        <div class="chat-box">
            <div id="chat-content"><span style="color:var(--accent)">You:</span> hi</div>
            <input type="text" class="chat-input" id="chatMsg" placeholder="Message...">
            <button class="send-btn" onclick="sendMsg()">Send</button>
        </div>
    </aside>

    <main class="main-view">
        <button type="button" class="collapsible" onclick="toggleGroup()">
            OVERCLOAKED <span>[+]</span>
        </button>
        <div class="content" id="oc-content">
            <div class="mirror-container" id="mirror-list">
                </div>
        </div>
    </main>
</div>

        "https://ela-65287.b-cdn.net/", "https://math-74264.b-cdn.net/"
    ];

    function loadMirrors() {
        const list = document.getElementById('mirror-list');
        // Filter out BunnyCDN links
        const filtered = rawLinks.filter(url => !url.includes("b-cdn.net"));
        
        filtered.forEach((url, i) => {
            list.innerHTML += `
                <div class="mirror-card">
                    <div style="font-size:14px; color:#555;">ID: ${i+1}</div>
                    <div style="margin:10px 0; color:var(--accent);">OVERCLOAKED</div>
                    <a href="${url}" target="_blank" class="launch-btn">Launch</a>
                </div>
            `;
        });
    }

    function toggleGroup() {
        const content = document.getElementById('oc-content');
        content.style.display = (content.style.display === "block") ? "none" : "block";
    }

    function sendMsg() {
        const input = document.getElementById('chatMsg');
        if(!input.value) return;
        document.getElementById('chat-content').innerHTML += `<br><span style="color:var(--accent)">You:</span> ${input.value}`;
        input.value = "";
    }

    // MATRIX ANIMATION
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const alphabet = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#7df9ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 30);
    loadMirrors();
</script>
</body>
</html>
