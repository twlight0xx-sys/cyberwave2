<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBERWAVE // UNLOCKED</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #7df9ff; --bg-dark: #050505; --panel: #0f0f0f; }
        * { box-sizing: border-box; cursor: crosshair; font-family: 'Lexend', sans-serif; font-weight: 700; }
        
        body, html { background: var(--bg-dark); color: #fff; margin: 0; height: 100vh; overflow: hidden; }

        /* MATRIX ANIMATION BACKGROUND */
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.25; }

        /* TOP NAV */
        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background: #000; border-bottom: 1px solid #1a1a1a;
        }
        .logo { color: var(--accent); font-size: 18px; letter-spacing: 1px; }
        .status { color: #fff; font-size: 14px; }

        /* MAIN LAYOUT */
        #app { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 50px); }

        /* SIDEBAR / LIVE CHAT AREA */
        .sidebar { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 20px; }
        .chat-box { flex: 1; background: #000; border-radius: 8px; margin-top: 15px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #111; }
        #chat-content { flex: 1; font-size: 14px; color: #888; overflow-y: auto; }
        .chat-input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; margin: 10px 0; }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 5px; width: 100%; }

        /* CONTENT AREA */
        .main-view { padding: 40px; overflow-y: auto; }
        .section-title { font-size: 24px; margin-bottom: 25px; color: #fff; }

        /* PROXY GRID SYSTEM */
        .mirror-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .mirror-card { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 12px; padding: 30px 20px; text-align: center; transition: 0.3s; }
        .mirror-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .mirror-name { font-size: 18px; margin-bottom: 20px; color: #fff; }
        .launch-btn { background: var(--accent); color: #000; text-decoration: none; padding: 10px 25px; border-radius: 6px; font-size: 14px; display: inline-block; }

        /* ADMIN DRAWER */
        #admin-panel { position: fixed; bottom: 0; right: 0; padding: 10px; }
        .admin-trigger { background: transparent; border: none; color: #222; font-size: 10px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav>
    <div class="logo">CYBER<span style="color:#fff">WAVE</span></div>
    <div class="status">Status: <span style="color:var(--accent)">Online</span></div>
</nav>

<div id="app">
    <aside class="sidebar">
        <div class="section-title" style="font-size:18px; margin-bottom:10px;">Live Chat</div>
        <div class="chat-box">
            <div id="chat-content">
                <span style="color:var(--accent)">You:</span> hi
            </div>
            <input type="text" class="chat-input" placeholder="Message..." id="chatMsg">
            <button class="send-btn" onclick="sendMsg()">Send</button>
        </div>
        
        <button class="send-btn" onclick="showSector('oc')" style="margin-top: 20px; background: #1a1a1a; color: #fff; border: 1px solid #333;">OPEN OVERCLOAKED [104]</button>
    </aside>

    <main class="main-view">
        <div id="home-view">
            <div class="section-title">Community Mirrors</div>
            <div class="mirror-container" id="mirror-list">
                </div>
        </div>
    </main>
</div>

<div id="admin-panel">
    <button class="admin-trigger" onclick="showAdmin()">[SYS_ROOT]</button>
</div>

<script>
    const links = [
        "https://overdih.netcrypto.org/", "https://mathedu.netcrypto.org/", 
        "https://singingfiles.com/show.php?l=0&u=1637402&id=73209", "https://rariripsck.vngeek.com/"
    ];

    function loadMirrors() {
        const list = document.getElementById('mirror-list');
        list.innerHTML = "";
        links.forEach((url, i) => {
            const name = url.split('/')[2].split('.')[0].toUpperCase();
            list.innerHTML += `
                <div class="mirror-card">
                    <div class="mirror-name">${name}</div>
                    <a href="${url}" target="_blank" class="launch-btn">Launch</a>
                </div>
            `;
        });
    }

    function sendMsg() {
        const input = document.getElementById('chatMsg');
        if(!input.value) return;
        const chat = document.getElementById('chat-content');
        chat.innerHTML += `<br><span style="color:var(--accent)">You:</span> ${input.value}`;
        input.value = "";
    }

    function showAdmin() {
        const p = prompt("ENTER ACCESS KEY:");
        if(p === "techyy") {
            const target = prompt("ID TO TERMINATE:");
            if(target) alert("ID " + target + " HAS BEEN PURGED.");
        }
    }

    // MATRIX ANIMATION
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const alphabet = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#7df9ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 30);
    loadMirrors();
</script>
</body>
</html>
