<!DOCTYPE html>
<html>
<head>
    <title>CyberWave | Hub</title>
    <style>
        /* CSS - The Design */
        body { background: #0a0a0c; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { background: #000; padding: 15px; border-bottom: 2px solid #00f2ff; display: flex; justify-content: space-between; }
        .logo { font-weight: bold; letter-spacing: 2px; }
        .logo span { color: #00f2ff; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #141418; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        #chat { flex: 1; background: #000; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 14px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #141418; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 80%; margin-bottom: 10px; }
        button { background: #00f2ff; color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo">CYBER<span>WAVE</span></div>
    <div>Status: Online</div>
</nav>

<div class="main">
    <div class="sidebar">
        <h3>Live Chat</h3>
        <div id="chat"></div>
        <input type="text" id="m" placeholder="Message...">
        <button onclick="send()">Send</button>
    </div>

    <div class="content">
        <h2>Community Mirrors</h2>
        <div style="margin-bottom: 20px; background: #141418; padding: 15px; border-radius: 8px;">
            <input type="text" id="n" placeholder="Site Name">
            <input type="text" id="u" placeholder="URL">
            <button onclick="add()">Add Site</button>
        </div>
        <div class="grid" id="g">
            <div class="card"><h4>Vapor</h4><button onclick="window.open('#')">Launch</button></div>
            <div class="card"><h4>Waves</h4><button onclick="window.open('#')">Launch</button></div>
        </div>
    </div>
</div>

<script>
    /* JS - The Logic */
    function send() {
        let i = document.getElementById('m');
        if(i.value) {
            document.getElementById('chat').innerHTML += `<p><strong>You:</strong> ${i.value}</p>`;
            i.value = '';
        }
    }
    function add() {
        let n = document.getElementById('n').value;
        let u = document.getElementById('u').value;
        if(n && u) {
            document.getElementById('g').innerHTML += `<div class="card"><h4>${n}</h4><button onclick="window.open('${u}')">Launch</button></div>`;
            document.getElementById('n').value = ''; document.getElementById('u').value = '';
        }
    }
</script>

</body>
</html>
