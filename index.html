<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBERWAVE // MISSION_CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00ff41; --blue: #58a6ff; --bg: #0a0e1a; --sidebar-bg: #05070f; --admin-gold: #f4d03f; --red: #ff3333; }
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; font-weight: 500; }
        
        body, html { background: var(--bg); color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .pop { animation: pop 0.3s ease-out; }

        /* Login Screen */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; z-index: 10; position: relative; }
        .login-box { width: 400px; padding: 40px; background: rgba(10, 14, 26, 0.98); border: 1px solid #1a2234; border-radius: 12px; }
        h1 { color: var(--green); margin: 0 0 20px 0; }
        label { display: block; color: var(--green); margin-bottom: 8px; font-size: 12px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #1a2234; color: #fff; border-radius: 6px; margin-bottom: 20px; outline: none; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; cursor: pointer; border: 2px solid var(--green); background: transparent; color: var(--green); font-weight: bold; }
        .btn-login { border-color: var(--blue); color: var(--blue); }

        /* FIXED SIDEBAR */
        #app { display: none; height: 100vh; width: 100%; position: relative; }
        .side-panel { position: fixed; top: 0; left: 0; width: 260px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid #1a2234; padding: 40px 20px; display: flex; flex-direction: column; z-index: 100; }
        .nav-item { padding: 15px; border-radius: 10px; cursor: pointer; color: #666; transition: 0.2s; margin-bottom: 10px; font-size: 14px; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(0, 255, 65, 0.1); color: var(--green); border-color: var(--green); }

        .main-view { margin-left: 260px; padding: 60px; height: 100vh; overflow-y: auto; }

        /* COLLAPSIBLE */
        .collapsible { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .collapsible-header { background: #161b22; padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .collapsible-content { display: none; padding: 20px; background: #0d1117; }
        .collapsible-content.active { display: block; }

        .proxy-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1a2234; }
        .proxy-row:last-child { border-bottom: none; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1a2234; }
        .btn-small { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* EMBED FRAME */
        #frame-container { display:none; position: fixed; top:0; left:260px; right:0; bottom:0; background:#000; z-index:1000; }
        iframe { width:100%; height:100%; border:none; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="login-screen">
    <div class="login-box pop">
        <h1>$ Cyberwave</h1>
        <label>> IDENTITY</label>
        <input type="text" id="u" placeholder="Username" autocomplete="off">
        <label>> SEC_STRING</label>
        <input type="password" id="p" placeholder="Password" autocomplete="off">
        <button class="btn" onclick="register()">[CREATE_ACCOUNT]</button>
        <button class="btn btn-login" onclick="login()">[EXECUTE_LOGIN]</button>
    </div>
</div>

<div id="app">
    <div class="side-panel">
        <h2 style="color:var(--green); margin-bottom: 40px;">CYBERWAVE</h2>
        <div class="nav-item active" id="nav-proxies" onclick="switchTab('proxies')">🌐 PROXIES</div>
        <div id="admin-nav" class="nav-item" style="display:none;" onclick="switchTab('admin')">🔑 ROOT_ACCESS</div>
        <div class="nav-item" style="margin-top: auto; color: var(--red);" onclick="location.reload()">LOGOUT</div>
    </div>

    <div class="main-view" id="main-view">
        <div id="view-proxies" class="pop">
            <h1 style="margin-bottom: 30px;">Network Exit Nodes</h1>
            
            <div class="collapsible">
                <div class="collapsible-header" onclick="toggleCollapsible()">
                    <span style="color:var(--blue); font-size: 18px;">⚡ OVERCLOAKED [BYPASS_ENABLED]</span>
                    <span id="arrow">▼</span>
                </div>
                <div class="collapsible-content" id="proxy-list">
                    <div class="proxy-row">
                        <span>Encrypted Node A</span>
                        <button class="btn btn-login" style="width:auto; padding: 5px 15px;" onclick="launchProxy('https://overdih.netcrypto.org/')">LAUNCH</button>
                    </div>
                    <div class="proxy-row">
                        <span>Stealth Node B</span>
                        <button class="btn btn-login" style="width:auto; padding: 5px 15px;" onclick="launchProxy('https://mathedu.netcrypto.org/')">LAUNCH</button>
                    </div>
                    <div class="proxy-row">
                        <span>Vapor Tunnel</span>
                        <button class="btn btn-login" style="width:auto; padding: 5px 15px;" onclick="launchProxy('https://rariripsck.vngeek.com/')">LAUNCH</button>
                    </div>
                </div>
            </div>
            <p style="color:#444; font-size:12px;">* If links are blocked, use [ROOT_ACCESS] to check for updated IP strings.</p>
        </div>

        <div id="view-admin" class="pop" style="display:none;">
            <h1 style="color:var(--admin-gold); margin-bottom: 30px;">User Database</h1>
            <div id="user-list" class="collapsible" style="padding:10px;"></div>
        </div>
    </div>
</div>
